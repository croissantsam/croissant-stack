name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  release:
    name: Release create-croissant
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install

      - name: Bump Version and Publish
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Prepare the template from the latest monorepo state
          npm run prepare-template -w create-croissant
          
          # Get the latest version from npm to avoid conflicts
          NPM_VERSION=$(npm view create-croissant version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(node -p "require('./packages/create-croissant/package.json').version")
          
          echo "NPM version: $NPM_VERSION"
          echo "Local version: $LOCAL_VERSION"
          
          # If npm has a higher version, sync local version first
          if [ "$NPM_VERSION" != "$LOCAL_VERSION" ] && [ "$(printf '%s\n' "$NPM_VERSION" "$LOCAL_VERSION" | sort -V | tail -n1)" = "$NPM_VERSION" ] && [ "$NPM_VERSION" != "0.0.0" ]; then
            echo "Syncing local version to $NPM_VERSION to avoid conflict"
            npm version $NPM_VERSION --no-git-tag-version -w create-croissant
          fi

          # Bump version (patch)
          # We do this from the root using workspaces to ensure all links are maintained
          npm version patch --no-git-tag-version -w create-croissant
          NEW_VERSION=$(node -p "require('./packages/create-croissant/package.json').version")
          REPO_VERSION=$(node -p "require('./package.json').version")
          
          echo "New version to be published: $NEW_VERSION"
          echo "Current repo version: $REPO_VERSION"

          # Build the package
          npm run build -w create-croissant
          
          # Publish to npm (using Trusted Publishing)
          # We move into the directory to ensure npm publish uses the correct package context
          cd packages/create-croissant
          npm publish --provenance --access public
          
          # Go back to root for git operations
          cd ../..
          
          # After successful publish, commit the version change and tag it
          git add packages/create-croissant/package.json
          git commit -m "chore: release create-croissant v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          
          # Push the version bump commit and tag back to main
          git push origin main --follow-tags

          # Create a GitHub Release
          # --generate-notes automatically creates a changelog based on commits
          # We use --target main to ensure the release is associated with the pushed branch
          gh release create "v$NEW_VERSION" \
            --target main \
            --title "Release v$NEW_VERSION (create-croissant)" \
            --generate-notes \
            --latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
