name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0 # Specific version to ensure npm >= 11.5.1
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  release:
    name: Release create-croissant
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0 # Specific version to ensure npm >= 11.5.1
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install

      - name: Bump Version and Publish
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Prepare the template from the latest monorepo state
          npm run prepare-template -w create-croissant
          
          # Bump version (patch)
          # We do this from the root using workspaces to ensure all links are maintained
          npm version patch --no-git-tag-version -w create-croissant
          NEW_VERSION=$(node -p "require('./packages/create-croissant/package.json').version")
          
          # Build the package
          npm run build -w create-croissant
          
          # Publish to npm (using Trusted Publishing)
          # We move into the directory to ensure npm publish uses the correct package context
          cd packages/create-croissant
          npm publish --access public --provenance
          
          # Go back to root for git operations
          cd ../..
          
          # After successful publish, commit the version change and tag it
          git add packages/create-croissant/package.json
          git commit -m "chore: release create-croissant v$NEW_VERSION [skip ci]"
          git tag "create-croissant@v$NEW_VERSION"
          
          # Push the version bump commit and tag back to main
          git push origin main --follow-tags
